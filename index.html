<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 統一英文遊戲名稱 -->
    <title>NEON SNAKE</title>
    
    <!-- 載入 Google 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/src/style.css">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #121212;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* 遊戲載入動畫面板 */
      #app-loading {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #050505;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        /* 🟢 修改：將原本的 0.3s 漸變優化，並確保可以透過 opacity 控制 */
        transition: opacity 0.25s ease, visibility 0.25s;
        font-family: 'Orbitron', monospace;
        opacity: 1;
        visibility: visible;
      }
      
      /* 🟢 當加上 .fade-out 類別時，快速淡出 */
      #app-loading.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(57, 255, 20, 0.1);
        border-radius: 50%;
        border-top-color: #39ff14;
        box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
        animation: spin 0.8s linear infinite; /* 🟢 微調：轉速稍微加快一點點 (1s -> 0.8s) 更有極速感 */
      }
      
      .loading-text {
        margin-top: 20px;
        color: #39ff14;
        font-size: 0.9rem;
        letter-spacing: 4px;
        text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- 🟢 修正：把 Loading 移到 #app 外面，避免 Vue 在掛載時跟它產生衝突 -->
    <div id="app"></div>

    <div id="app-loading">
      <div class="spinner"></div>
      <div class="loading-text">LOADING...</div>
    </div>
    
    <!-- 🟢 核心控制指令：一載入完畢，0秒延遲立刻閃電淡出！ -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('app-loading');
        if (loader) {
          // 立刻加上淡出動畫
          loader.classList.add('fade-out');
          // 動態結束後將 DOM 徹底移除，完全不佔用瀏覽器效能
          setTimeout(() => {
            loader.remove();
          }, 250);
        }
      });
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
